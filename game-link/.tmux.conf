# Tmux configuration for game-link project
# Enable mouse support for scrolling and pane selection

# Enable mouse mode (for tmux 2.1+)
set -g mouse on

# Enable clipboard integration for macOS
set-option -g set-clipboard external

# Enable mouse support for older tmux versions (< 2.1)
# Uncomment the following lines if mouse mode doesn't work:
# set -g mode-mouse on
# set -g mouse-resize-pane on
# set -g mouse-select-pane on
# set -g mouse-select-window on

# Improve scrolling experience
# Increase scrollback buffer size
set -g history-limit 10000

# Use vi mode for better navigation
setw -g mode-keys vi

# Use v and ^V for visual and block selection in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Copy to macOS clipboard using pbcopy
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# Auto copy on mouse selection end (macOS)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Better window and pane navigation
# Shift arrow keys for pane navigation
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Status bar improvements
set -g status-interval 5
set -g status-justify left
set -g status-left-length 90
set -g status-right-length 60
set -g status-left "#[fg=green]#S #[fg=blue]"
set -g status-right "#[fg=cyan]%d %b %R"

# Pane border colors
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51

# Window status colors
setw -g window-status-style fg=colour244
setw -g window-status-current-style fg=colour166,bold

# Message colors
set -g message-style fg=colour232,bg=colour166,bold

# Enable focus events (for terminal focus detection)
set -g focus-events on
